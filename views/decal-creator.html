<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VectorForge SVG Editor</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #172033;
      --panel-2: #0f172a;
      --line: #28364f;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-2: #38bdf8;
      --danger: #fb7185;
      --ok: #34d399;
      --warn: #fbbf24;
      --input: #0b1220;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); }
    button, input, select, textarea { font: inherit; }
    button { color: inherit; border: 0; cursor: pointer; }

    .app {
      display: grid;
      grid-template-rows: 48px 1fr 28px;
      height: 100vh;
      min-width: 980px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: linear-gradient(180deg, #1e293b, #111827);
      border-bottom: 1px solid var(--line);
      user-select: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px 0 4px;
      font-weight: 800;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 10px;
      display: grid; place-items: center;
      background: radial-gradient(circle at 25% 20%, #93c5fd, #2563eb 45%, #0f172a 90%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }

    .menu-group, .tool-options, .action-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .topbar .btn,
    .topbar .icon-btn {
      font-size: 12px;
      white-space: nowrap;
    }
    .topbar .btn {
      padding: 0 7px;
    }
    .topbar .icon-btn {
      padding: 0 6px;
    }
    .sep { width: 1px; height: 26px; background: var(--line); margin: 0 4px; }

    .btn, .tool-btn, .icon-btn {
      height: 32px;
      min-width: 32px;
      padding: 0 9px;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: .12s ease;
      border: 1px solid transparent;
    }
    .btn:hover, .tool-btn:hover, .icon-btn:hover { background: rgba(255,255,255,.07); }
    .btn.active, .tool-btn.active, .icon-btn.active {
      background: rgba(96,165,250,.18);
      border-color: rgba(96,165,250,.5);
      color: #bfdbfe;
    }
    .btn.primary { background: #2563eb; border-color: #3b82f6; }
    .btn.danger { color: #fecdd3; }

    .main {
      display: grid;
      grid-template-columns: 54px 280px 1fr 320px;
      min-height: 0;
    }

    .toolbar {
      background: var(--panel-2);
      border-right: 1px solid var(--line);
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .tool-btn { width: 40px; height: 40px; font-size: 18px; padding: 0; }

    .sidebar, .inspector {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
      min-height: 0;
    }
    .inspector { border-right: 0; border-left: 1px solid var(--line); }

    .panel {
      border-bottom: 1px solid var(--line);
      padding: 12px;
    }
    .panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .field { display: grid; gap: 5px; margin-bottom: 9px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inline { display: flex; align-items: center; gap: 8px; }
    label { font-size: 12px; color: var(--muted); }
    input, select, textarea {
      width: 100%;
      min-height: 30px;
      color: var(--text);
      background: var(--input);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 8px;
      outline: none;
    }
    input[type="color"] { padding: 2px; height: 32px; }
    input[type="range"] { padding: 0; }
    textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background-color: #0b1020;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.04) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.04) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.04) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    .stage-outer {
      position: absolute;
      inset: 0 16px 16px 0;
      overflow: hidden;
      cursor: crosshair;
    }
    .stage {
      position: absolute;
      transform-origin: 0 0;
      left: 40px;
      top: 40px;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,.35));
    }
    #svgRoot {
      display: block;
      background: white;
      overflow: visible;
      box-shadow: 0 0 0 1px rgba(255,255,255,.3);
    }
    .grid-line { pointer-events: none; stroke: #d1d5db; stroke-width: .5; opacity: .45; }
    .guide-line { pointer-events: none; stroke: #0ea5e9; stroke-width: 1; stroke-dasharray: 6 4; opacity: .8; }
    .select-box { pointer-events: none; fill: none; stroke: #2563eb; stroke-width: 1; stroke-dasharray: 5 4; vector-effect: non-scaling-stroke; }
    .handle { fill: white; stroke: #2563eb; stroke-width: 1.4; cursor: pointer; vector-effect: non-scaling-stroke; }
    .rotate-handle { fill: #fde68a; }
    .path-node { fill: #fff; stroke: #ef4444; stroke-width: 1.4; cursor: move; vector-effect: non-scaling-stroke; }
    .canvas-hscroll, .canvas-vscroll {
      position: absolute;
      z-index: 6;
      background: #0b1020;
      outline: none;
      border: 0;
      padding: 0;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    .canvas-hscroll {
      bottom: 0; left: 0; right: 16px;
      width: calc(100% - 16px);
      height: 16px;
      border-top: 1px solid var(--line);
    }
    .canvas-vscroll {
      top: 0; right: 0; bottom: 16px;
      width: 16px;
      height: calc(100% - 16px);
      writing-mode: vertical-lr;
      direction: rtl;
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      border-left: 1px solid var(--line);
    }
    .canvas-hscroll::-webkit-slider-runnable-track,
    .canvas-vscroll::-webkit-slider-runnable-track { background: #0b1020; }
    .canvas-hscroll::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 48px; height: 16px;
      background: #28364f;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #3d506b;
    }
    .canvas-vscroll::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 48px;
      background: #28364f;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #3d506b;
    }
    .canvas-hscroll::-moz-range-thumb {
      width: 48px; height: 12px;
      background: #28364f;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #3d506b;
    }
    .canvas-vscroll::-moz-range-thumb {
      width: 12px; height: 48px;
      background: #28364f;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #3d506b;
    }
    .canvas-scroll-corner {
      position: absolute;
      bottom: 0; right: 0;
      width: 16px; height: 16px;
      background: #0b1020;
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      z-index: 6;
    }

    .ruler-x, .ruler-y {
      position: absolute;
      background: rgba(15,23,42,.92);
      color: #94a3b8;
      z-index: 5;
      font-size: 10px;
      user-select: none;
      pointer-events: none;
    }
    .ruler-x { left: 0; right: 0; top: 0; height: 22px; border-bottom: 1px solid var(--line); }
    .ruler-y { top: 0; bottom: 0; left: 0; width: 22px; border-right: 1px solid var(--line); }

    .layer-list, .object-list { display: grid; gap: 6px; }
    .layer, .object-item {
      display: grid;
      grid-template-columns: 24px 1fr 24px 24px;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(255,255,255,.035);
      border: 1px solid transparent;
      border-radius: 9px;
    }
    .layer.active, .object-item.active { border-color: var(--accent); background: rgba(96,165,250,.14); }
    .layer-name, .object-name { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 13px; }
    .small { font-size: 11px; color: var(--muted); }

    .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
    .swatch { aspect-ratio: 1; border-radius: 7px; border: 1px solid rgba(255,255,255,.25); cursor: pointer; }

    .statusbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 0 10px;
      color: var(--muted); background: #0b1220; border-top: 1px solid var(--line);
      font-size: 12px; user-select: none;
    }
    .kbd { padding: 1px 5px; border: 1px solid var(--line); border-radius: 5px; background: #111827; color: #cbd5e1; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(780px, calc(100vw - 50px)); max-height: calc(100vh - 70px); overflow: auto; background: #111827; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
    .modal h2 { margin: 0 0 12px; }
    .toast { position: fixed; bottom: 42px; left: 50%; transform: translateX(-50%); background: #020617; color: white; padding: 9px 14px; border: 1px solid var(--line); border-radius: 999px; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: .18s; z-index: 60; }
    .toast.show { opacity: 1; }

    .hidden-file { display: none; }
    .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .mini-grid .btn { width: 100%; font-size: 12px; padding: 0 5px; }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.45; }

    @media (max-width: 980px) {
      html, body { overflow: hidden; }
      .app {
        min-width: 0;
        width: 100%;
        height: 100dvh;
        grid-template-rows: auto minmax(0, 1fr) 26px;
      }
      .topbar {
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 6px;
        max-height: 116px;
        overflow-y: auto;
        padding: 6px;
      }
      .brand {
        flex: 1 1 100%;
        min-width: 0;
        padding-right: 0;
      }
      .brand-mark {
        width: 24px;
        height: 24px;
        border-radius: 7px;
      }
      .menu-group,
      .tool-options,
      .action-group {
        flex-wrap: wrap;
      }
      .sep { display: none; }
      .main {
        grid-template-columns: 46px minmax(0, 1fr);
        grid-template-rows: minmax(220px, 1fr) minmax(160px, 28vh) minmax(190px, 34vh);
        overflow: hidden;
      }
      .toolbar {
        grid-column: 1;
        grid-row: 1 / 4;
        padding: 6px 4px;
      }
      .tool-btn {
        width: 36px;
        height: 36px;
      }
      .canvas-wrap {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        min-height: 220px;
      }
      .sidebar {
        grid-column: 2;
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }
      .inspector {
        grid-column: 2;
        grid-row: 3;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      .panel { padding: 10px; }
      .statusbar {
        font-size: 10px;
        gap: 6px;
        overflow: hidden;
      }
      .statusbar > div:nth-child(2) { display: none; }
    }

    @media (max-width: 560px) {
      .topbar .btn,
      .topbar .icon-btn {
        height: 28px;
        min-width: 28px;
        padding: 0 6px;
        font-size: 11px;
      }
      .topbar label {
        font-size: 11px;
      }
      #zoomInput {
        width: 54px !important;
        min-height: 28px;
      }
      .main {
        grid-template-rows: minmax(200px, 1fr) minmax(140px, 24vh) minmax(180px, 32vh);
      }
      .field-row,
      .mini-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">✦</div><span>VectorForge<small>by RMG</small></span></div>
      <div class="menu-group">
        <button class="btn" id="newBtn">New</button>
        <button class="btn" id="openBtn">Open SVG</button>
        <button class="btn" id="importImageBtn">Image</button>
        <button class="btn primary" id="saveBtn">Export SVG</button>
        <button class="btn" id="pngBtn">PNG</button>
        <button class="btn primary" id="sendToCustomizerBtn">Send to Customizer</button>
        <button class="btn" id="backToCustomizerBtn">Back to Customizer</button>
      </div>
      <div class="sep"></div>
      <div class="action-group">
        <button class="icon-btn" id="undoBtn" title="Undo (Ctrl+Z)">↶</button>
        <button class="icon-btn" id="redoBtn" title="Redo (Ctrl+Y)">↷</button>
        <button class="icon-btn" id="cutBtn">Cut</button>
        <button class="icon-btn" id="copyBtn">Copy</button>
        <button class="icon-btn" id="pasteBtn">Paste</button>
        <button class="icon-btn danger" id="deleteBtn">Del</button>
      </div>
      <div class="sep"></div>
      <div class="tool-options">
        <label>Zoom</label><input id="zoomInput" type="number" min="10" max="800" value="100" style="width:70px">%
        <button class="icon-btn" id="zoomFitBtn">Fit</button>
        <button class="icon-btn" id="zoom100Btn">100%</button>
      </div>
      <div class="sep"></div>
      <div class="tool-options">
        <label><input id="snapToggle" type="checkbox" checked style="width:auto; min-height:auto"> Snap</label>
        <label><input id="gridToggle" type="checkbox" checked style="width:auto; min-height:auto"> Grid</label>
        <label><input id="rulerToggle" type="checkbox" checked style="width:auto; min-height:auto"> Rulers</label>
      </div>
    </header>

    <main class="main">
      <aside class="toolbar" id="toolbar"></aside>

      <aside class="sidebar">
        <section class="panel">
          <h3>Document</h3>
          <div class="field-row">
            <div class="field"><label>Width</label><input id="docW" type="number" value="1200"></div>
            <div class="field"><label>Height</label><input id="docH" type="number" value="800"></div>
          </div>
          <div class="field-row">
            <button class="btn" id="resizeDocBtn">Resize</button>
            <button class="btn" id="sourceBtn">SVG Source</button>
          </div>
        </section>
        <section class="panel">
          <h3>Layers</h3>
          <div class="field-row">
            <button class="btn" id="addLayerBtn">Add</button>
            <button class="btn" id="deleteLayerBtn">Delete</button>
          </div>
          <div class="field-row">
            <button class="btn" id="layerUpBtn">Up</button>
            <button class="btn" id="layerDownBtn">Down</button>
          </div>
          <div class="layer-list" id="layerList"></div>
        </section>
        <section class="panel">
          <h3>Objects</h3>
          <div class="object-list" id="objectList"></div>
        </section>
      </aside>

      <section class="canvas-wrap" id="canvasWrap">
        <div class="ruler-x" id="rulerX"></div><div class="ruler-y" id="rulerY"></div>
        <div class="stage-outer" id="stageOuter">
          <div class="stage" id="stage">
            <svg id="svgRoot" xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
              <defs>
                <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
                  <path d="M 20 0 L 0 0 0 20" class="grid-line" />
                </pattern>
                <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker>
                <filter id="dropShadow"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity=".35"/></filter>
              </defs>
              <rect id="gridRect" width="100%" height="100%" fill="url(#gridPattern)" pointer-events="none"/>
              <g id="content"></g>
              <g id="uiLayer"></g>
            </svg>
          </div>
        </div>
        <input type="range" id="hScroll" class="canvas-hscroll" />
        <input type="range" id="vScroll" class="canvas-vscroll" orient="vertical" />
        <div class="canvas-scroll-corner"></div>
      </section>

      <aside class="inspector">
        <section class="panel">
          <h3>Selection</h3>
          <div id="selectionInfo" class="hint">No object selected.</div>
          <div class="field-row">
            <button class="btn" id="groupBtn">Group</button>
            <button class="btn" id="ungroupBtn">Ungroup</button>
          </div>
          <div class="field-row">
            <button class="btn" id="frontBtn">To Front</button>
            <button class="btn" id="backBtn">To Back</button>
          </div>
          <div class="mini-grid">
            <button class="btn" data-align="left">Left</button><button class="btn" data-align="center">Center</button><button class="btn" data-align="right">Right</button>
            <button class="btn" data-align="top">Top</button><button class="btn" data-align="middle">Middle</button><button class="btn" data-align="bottom">Bottom</button>
          </div>
        </section>

        <section class="panel">
          <h3>Transform</h3>
          <div class="field-row"><div class="field"><label>X</label><input id="xInput" type="number"></div><div class="field"><label>Y</label><input id="yInput" type="number"></div></div>
          <div class="field-row"><div class="field"><label>W</label><input id="wInput" type="number"></div><div class="field"><label>H</label><input id="hInput" type="number"></div></div>
          <div class="field-row"><div class="field"><label>Rotate</label><input id="rotInput" type="number" value="0"></div><div class="field"><label>Opacity</label><input id="opacityInput" type="number" min="0" max="1" step=".05" value="1"></div></div>
          <div class="field-row"><button class="btn" id="flipHBtn">Flip H</button><button class="btn" id="flipVBtn">Flip V</button></div>
        </section>

        <section class="panel">
          <h3>Fill & Stroke</h3>
          <div class="field-row"><div class="field"><label>Fill</label><input id="fillInput" type="color" value="#60a5fa"></div><div class="field"><label>Stroke</label><input id="strokeInput" type="color" value="#111827"></div></div>
          <div class="field-row"><div class="field"><label>Stroke W</label><input id="strokeWidthInput" type="number" min="0" value="2"></div><div class="field"><label>Dash</label><input id="dashInput" placeholder="5 4"></div></div>
          <div class="field-row"><button class="btn" id="noFillBtn">No Fill</button><button class="btn" id="noStrokeBtn">No Stroke</button></div>
          <div class="field"><label>Swatches</label><div class="swatches" id="swatches"></div></div>
        </section>

        <section class="panel">
          <h3>Text / Path</h3>
          <div class="field"><label>Text content</label><textarea id="textInput"></textarea></div>
          <div class="field-row"><div class="field"><label>Font Size</label><input id="fontSizeInput" type="number" value="48"></div><div class="field"><label>Font</label><select id="fontInput"><option>Arial</option><option>Georgia</option><option>Courier New</option><option>Times New Roman</option><option>Verdana</option><option>Impact</option></select></div></div>
          <div class="field-row"><button class="btn" id="pathEditBtn">Edit Nodes</button><button class="btn" id="objectToPathBtn">Object to Path</button></div>
        </section>

        <section class="panel">
          <h3>Effects</h3>
          <div class="field-row"><button class="btn" id="shadowBtn">Shadow</button><button class="btn" id="removeEffectsBtn">Clear</button></div>
          <div class="field"><label>Clip path by top object</label><button class="btn" id="clipBtn">Set Clip</button></div>
        </section>
      </aside>
    </main>

    <footer class="statusbar">
      <div id="statusLeft">Ready. Drag canvas with middle mouse or Space.</div>
      <div><span class="kbd">V</span> select <span class="kbd">N</span> pen <span class="kbd">T</span> text <span class="kbd">Ctrl+Z</span> undo</div>
      <div id="coords">x:0 y:0</div>
    </footer>
  </div>

  <input id="fileInput" class="hidden-file" type="file" accept=".svg,image/svg+xml" />
  <input id="imageInput" class="hidden-file" type="file" accept="image/*" />

  <div class="modal-backdrop" id="sourceModal">
    <div class="modal">
      <h2>SVG Source</h2>
      <textarea id="sourceText" style="min-height:420px"></textarea>
      <div class="field-row" style="margin-top:12px"><button class="btn primary" id="applySourceBtn">Apply Source</button><button class="btn" id="closeSourceBtn">Close</button></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (() => {
      const NS = 'http://www.w3.org/2000/svg';
      const XLINK = 'http://www.w3.org/1999/xlink';
      const CUSTOM_DECAL_STORAGE_KEY = 'rmg_decal_editor_custom_decal';
      const CURRENT_USER_KEY = 'rmg_current_user';
      const SAVED_DESIGNS_KEY = 'rmg_saved_decal_designs';
      const $ = id => document.getElementById(id);
      const svg = $('svgRoot');
      const content = $('content');
      const ui = $('uiLayer');
      const stage = $('stage');
      const stageOuter = $('stageOuter');
      const canvasWrap = $('canvasWrap');
      const state = {
        tool: 'select', zoom: 1, pan: {x: 40, y: 40}, selected: [], activeLayer: null,
        fill: '#60a5fa', stroke: '#111827', strokeWidth: 2, dash: '',

      function createMarquee(x,y){ const el=document.createElement('div'); el.className='marquee'; el.style.left=x+'px'; el.style.top=y+'px'; canvasWrap.appendChild(el); return el; }
      function updateMarquee(ev){ const sp=screenPos(ev), d=state.drag; const x=Math.min(sp.x,d.sx), y=Math.min(sp.y,d.sy), w=Math.abs(sp.x-d.sx), h=Math.abs(sp.y-d.sy); Object.assign(d.el.style,{left:x+'px',top:y+'px',width:w+'px',height:h+'px'}); }
      function finishMarquee(){ const r=state.drag.el.getBoundingClientRect(); state.drag.el.remove(); state.selected=objects().filter(o=>{ const b=o.getBoundingClientRect(); return b.left>=r.left&&b.right<=r.right&&b.top>=r.top&&b.bottom<=r.bottom; }).map(o=>o.id); }

      function updateInspector() {
        const els=selectedEls(); $('selectionInfo').textContent = els.length ? `${els.length} selected: ${els.map(e=>e.tagName).join(', ')}` : 'No object selected.';
        const key=state.selected.join('|');
        if (key!==state.selectionKey) { state.selectionKey=key; state.rotInputPrev=0; $('rotInput').value=0; }
        const b=multiBBox(els); ['xInput','yInput','wInput','hInput'].forEach(id=>$(id).value=''); if(b){ $('xInput').value=b.x.toFixed(1); $('yInput').value=b.y.toFixed(1); $('wInput').value=b.width.toFixed(1); $('hInput').value=b.height.toFixed(1); }
        if(els[0]) { $('opacityInput').value=els[0].getAttribute('opacity')||1; $('textInput').value=els[0].tagName==='text'?els[0].textContent:$('textInput').value; }
      }
      function applyInspector() {
        state.fill=$('fillInput').value; state.stroke=$('strokeInput').value; state.strokeWidth=+$('strokeWidthInput').value; state.dash=$('dashInput').value;
        selectedEls().forEach(e=>{ if(e.tagName!=='image'){ e.setAttribute('fill', state.fill); e.setAttribute('stroke', state.stroke); e.setAttribute('stroke-width', state.strokeWidth); e.setAttribute('vector-effect','non-scaling-stroke'); state.dash?e.setAttribute('stroke-dasharray',state.dash):e.removeAttribute('stroke-dasharray'); } e.setAttribute('opacity',$('opacityInput').value||1); if(e.tagName==='text'){ e.textContent=$('textInput').value; e.setAttribute('font-size',$('fontSizeInput').value); e.setAttribute('font-family',$('fontInput').value); }}); renderSelection(); }
      function applyTransformInputs(ev) {
        const els=selectedEls();
        if(!els.length) return;
        const b=multiBBox(els);
        if(!b) return;
        saveHistory();
        const nx=+$('xInput').value, ny=+$('yInput').value, nw=+$('wInput').value, nh=+$('hInput').value, rot=+$('rotInput').value;

        if (ev?.target?.id === 'rotInput') {
          const delta=rot-state.rotInputPrev;
          state.rotInputPrev=rot;
          els.forEach(e=>{
            const eb=safeBBox(e);
            if (!eb) return;
            const ecx=eb.x+eb.width/2, ecy=eb.y+eb.height/2;
            const next=rotateMatrixAround(getLocalMatrix(e), delta, ecx, ecy);
            e.setAttribute('transform', matrixToAttr(next));
          });
          renderAll();
          return;
        }

        const sx=isFinite(nw)&&nw&&b.width?nw/b.width:1, sy=isFinite(nh)&&nh&&b.height?nh/b.height:1;
        const dx=(isFinite(nx)?nx:b.x)-b.x, dy=(isFinite(ny)?ny:b.y)-b.y;
        els.forEach(e=>{
          e.setAttribute('transform',`${e.getAttribute('transform')||''} translate(${dx} ${dy}) translate(${b.x} ${b.y}) scale(${sx} ${sy}) translate(${-b.x} ${-b.y})`);
        });
        renderAll();
      }

      function renderLayers() { const list=$('layerList'); list.innerHTML=''; [...content.querySelectorAll('g[data-layer]')].reverse().forEach(layer=>{ const row=document.createElement('div'); row.className='layer'+(layer===state.activeLayer?' active':''); row.innerHTML=`<span>▦</span><span class="layer-name">${layer.dataset.layer}</span><button>👁</button><button>🔒</button>`; row.onclick=()=>{state.activeLayer=layer; renderLayers();}; row.children[2].onclick=e=>{e.stopPropagation(); layer.style.display=layer.style.display==='none'?'':'none';}; row.children[3].onclick=e=>{e.stopPropagation(); layer.dataset.locked=layer.dataset.locked==='true'?'false':'true';}; list.appendChild(row); }); }
      function renderObjects() { $('objectList').innerHTML = objects().reverse().map(o=>`<div class="object-item ${state.selected.includes(o.id)?'active':''}" data-id="${o.id}"><span>${iconFor(o)}</span><span class="object-name">${o.id}</span><button data-vis="${o.id}">👁</button><button data-lock="${o.id}">🔒</button></div>`).join(''); document.querySelectorAll('.object-item').forEach(r=>r.onclick=e=>{ if(e.target.tagName==='BUTTON')return; selectOnly($(r.dataset.id)); }); }
      function iconFor(o){ return ({rect:'▭',ellipse:'◯',path:'〰',line:'╱',polygon:'◇',text:'T',image:'▧',g:'▦'})[o.tagName]||'◆'; }
      function deleteLayer(){ if(content.querySelectorAll('g[data-layer]').length<=1) return toast('At least one layer required'); saveHistory(); state.activeLayer.remove(); state.activeLayer=content.querySelector('g[data-layer]'); renderAll(); }
      function moveLayer(dir){ const l=state.activeLayer; if(!l)return; saveHistory(); if(dir>0&&l.nextSibling) content.insertBefore(l.nextSibling,l); if(dir<0&&l.previousSibling) content.insertBefore(l,l.previousSibling); renderAll(); }

      function copy(){ state.clipboard=selectedEls().map(e=>e.cloneNode(true)); toast('Copied'); }
      function paste(){ if(!state.clipboard.length)return; saveHistory(); const pasted=state.clipboard.map(c=>{ const n=c.cloneNode(true); n.id=uid(n.tagName); n.setAttribute('transform',(n.getAttribute('transform')||'')+' translate(20 20)'); activeLayer().appendChild(n); return n.id; }); state.selected=pasted; renderAll(); }
      function removeSelected(){ if(!state.selected.length)return; saveHistory(); selectedEls().forEach(e=>e.remove()); state.selected=[]; renderAll(); }
      function undo(){ if(state.undo.length<2)return; state.redo.push(state.undo.pop()); restore(state.undo[state.undo.length-1]); }
      function redo(){ if(!state.redo.length)return; const m=state.redo.pop(); state.undo.push(m); restore(m); }
      function group(){ const els=selectedEls(); if(els.length<2)return; saveHistory(); const g=make('g',{id:uid('group'),'data-vf-object':'true'},activeLayer()); els.forEach(e=>g.appendChild(e)); selectOnly(g); renderAll(); }
      function ungroup(){ saveHistory(); selectedEls().filter(e=>e.tagName==='g').forEach(g=>{ const parent=g.parentNode; [...g.children].forEach(ch=>parent.insertBefore(ch,g)); g.remove(); }); state.selected=[]; renderAll(); }
      function zOrder(where){ saveHistory(); selectedEls().forEach(e=> where==='front'?e.parentNode.appendChild(e):e.parentNode.insertBefore(e,e.parentNode.firstChild)); renderAll(); }
      function align(kind){ const els=selectedEls(); if(!els.length)return; saveHistory(); const doc={x:0,y:0,width:state.doc.w,height:state.doc.h}; els.forEach(e=>{ const b=safeBBox(e); let dx=0,dy=0; if(kind==='left')dx=doc.x-b.x; if(kind==='center')dx=doc.x+doc.width/2-(b.x+b.width/2); if(kind==='right')dx=doc.width-(b.x+b.width); if(kind==='top')dy=doc.y-b.y; if(kind==='middle')dy=doc.height/2-(b.y+b.height/2); if(kind==='bottom')dy=doc.height-(b.y+b.height); e.setAttribute('transform',`${e.getAttribute('transform')||''} translate(${dx} ${dy})`); }); renderAll(); }
      function flip(axis){ const b=multiBBox(selectedEls()); if(!b)return; saveHistory(); const cx=b.x+b.width/2, cy=b.y+b.height/2; selectedEls().forEach(e=>e.setAttribute('transform',`${e.getAttribute('transform')||''} translate(${axis==='h'?cx:0} ${axis==='v'?cy:0}) scale(${axis==='h'?-1:1} ${axis==='v'?-1:1}) translate(${axis==='h'?-cx:0} ${axis==='v'?-cy:0})`)); renderAll(); }
      function pickStyle(el){ ['fill','stroke','stroke-width'].forEach(a=>{ const v=el.getAttribute(a); if(v && v!=='none'){ if(a==='fill'){$('fillInput').value=v;state.fill=v;} if(a==='stroke'){$('strokeInput').value=v;state.stroke=v;} if(a==='stroke-width'){$('strokeWidthInput').value=v;state.strokeWidth=+v;} }}); toast('Style picked'); }

      function objectToPath(){ toast('Object-to-path supports existing paths natively in this browser build'); }
      function setClip(){ const els=selectedEls(); if(els.length<2)return toast('Select target(s), then top clip object'); saveHistory(); const clipShape=els[els.length-1].cloneNode(true); clipShape.removeAttribute('data-vf-object'); const cp=make('clipPath',{id:uid('clip')},svg.querySelector('defs')); cp.appendChild(clipShape); els.slice(0,-1).forEach(e=>e.setAttribute('clip-path',`url(#${cp.id})`)); els[els.length-1].remove(); state.selected=els.slice(0,-1).map(e=>e.id); renderAll(); }

      function resizeDoc(){ saveHistory(); state.doc.w=+$('docW').value; state.doc.h=+$('docH').value; svg.setAttribute('width',state.doc.w); svg.setAttribute('height',state.doc.h); svg.setAttribute('viewBox',`0 0 ${state.doc.w} ${state.doc.h}`); updateStage(); }
      function openSource(){ $('sourceText').value=cleanSvg(); $('sourceModal').classList.add('open'); }
      function applySource(){ saveHistory(); restore($('sourceText').value); $('sourceModal').classList.remove('open'); }
      function loadSvgFile(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{saveHistory(); restore(r.result);}; r.readAsText(f); }
      function loadImageFile(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{saveHistory(); const img=make('image',{id:uid('image'),'data-vf-object':'true',x:80,y:80,width:320,height:220,href:r.result},activeLayer()); selectOnly(img); renderAll();}; r.readAsDataURL(f); }
      function downloadSvg(){ const blob=new Blob([cleanSvg()],{type:'image/svg+xml'}); download(blob,'vectorforge.svg'); }
      function downloadPng(){ const data=cleanSvg(); const img=new Image(); const url=URL.createObjectURL(new Blob([data],{type:'image/svg+xml'})); img.onload=()=>{ const c=document.createElement('canvas'); c.width=state.doc.w; c.height=state.doc.h; const ctx=c.getContext('2d'); ctx.fillStyle='white'; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0); c.toBlob(b=>download(b,'vectorforge.png')); URL.revokeObjectURL(url); }; img.src=url; }
      function storageGet(key,fallback){ try { const raw=localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch { return fallback; } }
      function storageSet(key,value){ localStorage.setItem(key, JSON.stringify(value)); }
      function currentUser(){ return storageGet(CURRENT_USER_KEY, null); }
      function savedDesigns(){ const designs=storageGet(SAVED_DESIGNS_KEY, []); return Array.isArray(designs) ? designs : []; }
      function saveCurrentDesignToAccount(){
        const user=currentUser();
        if(!user?.id) return false;
        const designs=savedDesigns();
        const existing=state.savedDesignId ? designs.find(d=>d.id===state.savedDesignId && d.userId===user.id) : null;
        const defaultName=existing?.name || `SVG decal ${new Date().toLocaleDateString()}`;
        const name=prompt('Save this decal design as:', defaultName);
        if(name===null) return false;
        const trimmed=(name || defaultName).trim() || defaultName;
        const now=new Date().toISOString();
        const design={
          id: existing?.id || `svg-design-${Date.now()}`,
          userId: user.id,
          name: trimmed,
          svgText: cleanSvg(),
          updatedAt: now,
          createdAt: existing?.createdAt || now
        };
        const next=[design, ...designs.filter(d=>d.id!==design.id)];
        storageSet(SAVED_DESIGNS_KEY, next);
        state.savedDesignId=design.id;
        toast('Design saved to your account.');
        return true;
      }
      function loadSavedDesignFromUrl(){
        const id=new URLSearchParams(window.location.search).get('design');
        if(!id) return;
        const user=currentUser();
        const design=savedDesigns().find(d=>d.id===id && (!user?.id || d.userId===user.id));
        if(!design?.svgText) { toast('Saved design not found.'); return; }
        restore(design.svgText);
        state.savedDesignId=design.id;
        updateStatus(`Opened ${design.name || 'saved design'}`);
      }
      function backToCustomizer(){
        const user=currentUser();
        if(user?.id && confirm('Save your current SVG decal design to your account before going back to the customizer?')) {
          saveCurrentDesignToAccount();
        }
        window.location.href='/customize';
      }
      function sendToCustomizer(){
        const svgText=cleanSvg();
        try {
          localStorage.setItem(CUSTOM_DECAL_STORAGE_KEY, JSON.stringify({
            id: `decal-creator-${Date.now()}`,
            label: 'Decal Creator Design',
            svgText,
            createdAt: new Date().toISOString()
          }));
          window.location.href = '/customize?decal=editor';
        } catch {
          toast('Could not send decal. Try exporting the SVG instead.');
        }
      }
      function download(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

      function setZoom(z, center=null){ const old=state.zoom; state.zoom=Math.min(8,Math.max(.1,z)); if(center){ state.pan.x -= center.x*(state.zoom-old); state.pan.y -= center.y*(state.zoom-old); } $('zoomInput').value=Math.round(state.zoom*100); updateStage(); renderSelection(); }
      function zoomFit(){ const r=stageOuter.getBoundingClientRect(); const z=Math.min((r.width-80)/state.doc.w,(r.height-80)/state.doc.h); state.zoom=Math.max(.1,Math.min(4,z)); state.pan={x:(r.width-state.doc.w*state.zoom)/2,y:(r.height-state.doc.h*state.zoom)/2}; $('zoomInput').value=Math.round(state.zoom*100); updateStage(); }
      function updateStage(){ stage.style.transform=`translate(${state.pan.x}px,${state.pan.y}px) scale(${state.zoom})`; svg.setAttribute('width',state.doc.w); svg.setAttribute('height',state.doc.h); renderRulers(); syncScrollbars(); }
      function syncScrollbars() {
        const hs=$('hScroll'), vs=$('vScroll');
        if (!hs || !vs) return;
        const r = canvasWrap.getBoundingClientRect();
        const docW = state.doc.w * state.zoom, docH = state.doc.h * state.zoom;
        const pad = 80;
        const minX = -(docW - pad), maxX = r.width - pad;
        const minY = -(docH - pad), maxY = r.height - pad;
        hs.min = minX; hs.max = maxX; hs.step = 1;
        hs.value = -state.pan.x;
        vs.min = minY; vs.max = maxY; vs.step = 1;
        vs.value = -state.pan.y;
      }
      function onWheel(e){ e.preventDefault(); if(e.ctrlKey||e.metaKey){ const p=rawPoint(e); setZoom(state.zoom*(e.deltaY<0?1.12:.88),p); } else if(e.shiftKey){ state.pan.x-=e.deltaY; updateStage(); } else { state.pan.x-=e.deltaX; state.pan.y-=e.deltaY; updateStage(); } }
      function renderRulers(){ $('rulerX').style.display=state.rulers?'block':'none'; $('rulerY').style.display=state.rulers?'block':'none'; if(!state.rulers)return; $('rulerX').innerHTML=''; $('rulerY').innerHTML=''; for(let x=0;x<=state.doc.w;x+=100){ const d=document.createElement('div'); d.textContent=x; d.style.cssText=`position:absolute;left:${state.pan.x+x*state.zoom}px;top:3px`; $('rulerX').appendChild(d); } for(let y=0;y<=state.doc.h;y+=100){ const d=document.createElement('div'); d.textContent=y; d.style.cssText=`position:absolute;top:${state.pan.y+y*state.zoom}px;left:3px;writing-mode:vertical-rl`; $('rulerY').appendChild(d); } }
      function updateStatus(s){ $('statusLeft').textContent=s; }
      function keyDown(e){
        if(e.target.matches('input,textarea,select')) return;
        if(e.code==='Space'){state.space=true; return;} if(e.key==='v')setTool('select'); if(e.key==='n')setTool('pen'); if(e.key==='t')setTool('text'); if(e.key==='r')setTool('rect'); if(e.key==='e')setTool('ellipse');
        if(e.key==='Delete'||e.key==='Backspace') removeSelected();
        if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault(); e.shiftKey?redo():undo();}
        if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault(); redo();}
        if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='c') copy(); if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='x'){copy();removeSelected();} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='v') paste();
        if(e.key==='Escape'){ state.drawing=null; clearSelection(); setTool('select'); }
        if(e.key==='Enter' && state.drawing){ state.drawing=null; saveHistory(); setTool('select'); }
      }

      init();
    })();
  </script>
</body>
</html>
