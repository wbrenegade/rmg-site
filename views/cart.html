<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart | RenegadeMade Graphix</title>
  <meta name="description" content="Review your custom decal and vehicle graphics order before checkout." />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="RenegadeMade Graphix" />
  <meta property="og:url" content="https://renegademadegraphix.com/cart" />
  <meta property="og:title" content="Your Cart | RenegadeMade Graphix" />
  <meta property="og:description" content="Review your custom decal and vehicle graphics order before checkout." />
  <meta property="og:image" content="https://renegademadegraphix.com/assets/imgs/main.PNG" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Your Cart | RenegadeMade Graphix" />
  <meta name="twitter:description" content="Review your custom decal and vehicle graphics order before checkout." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><img class="brand-mark" src="assets/imgs/rmg_logo.png" alt="RMG logo" /></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="/tools">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="faq.html">FAQ</a>
        <a href="login.html">Login</a>
        <a href="signup.html" class="btn btn-sm">Sign Up</a>
        <a href="cart.html" class="cart-link active">Cart <span id="cartCount">0</span></a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero compact">
      <div class="container">
        <p class="eyebrow">Cart</p>
        <h1>Your cart</h1>
        <p>Review your graphics before checkout.</p>
      </div>
    </section>

    <section class="section">
      <div class="container cart-layout">
        <div class="card">
          <div id="cartItems"></div>
        </div>
        <aside class="card summary-card">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span id="cartSubtotal">$0.00</span></div>
          <div class="summary-row"><span>Estimated Tax</span><span id="cartTax">$0.00</span></div>
          <div class="summary-row total"><span>Total</span><span id="cartTotal">$0.00</span></div>
          <a href="checkout.html" class="btn btn-block">Proceed to Checkout</a>
          <a href="shop.html" class="btn btn-outline btn-block">Continue Shopping</a>
        </aside>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom"><p>© <span id="year"></span> RenegadeMade Graphix</p></div>
  </footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cart.js"></script>
</body>
</html>
